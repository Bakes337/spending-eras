kind = "web"
previewPath = "/"
title = "Spending Eras"
version = "1.0.0"
id = "artifacts/spending-eras"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20689

[services.development]
run = "pnpm --filter @workspace/spending-eras run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/spending-eras", "run", "build" ]
publicDir = "artifacts/spending-eras/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20689"
BASE_PATH = "/"
